name: Veille Hebdomadaire IT

on:
  schedule:
    # Tous les vendredis à 9h UTC (11h Paris en été)
    - cron: "0 9 * * 5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (all / veille / emploi)"
        required: false
        default: "all"
      dry_run:
        description: "Dry run (pas d'email)"
        required: false
        type: boolean
        default: false

jobs:
  veille-tech:
    name: "📡 VeilleTech — Tendances Tech"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.mode == 'all' || github.event.inputs.mode == 'veille' || github.event_name == 'schedule' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/veille/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/veille/requirements.txt

      - name: Run VeilleTech
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENT: ${{ secrets.SMTP_RECIPIENT }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/veille/veille_tech.py $DRY_FLAG

      - name: Commit rapport tech
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add veille/rapports/tech/
          git diff --staged --quiet || git commit -m "📡 Rapport VeilleTech $(date +%Y-%m-%d)"
          git push

  stats-emploi:
    name: "📊 StatsEmploi — Marché Emploi IT"
    runs-on: ubuntu-latest
    needs: veille-tech
    if: always() && (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'emploi' || github.event_name == 'schedule' == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/veille/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/veille/requirements.txt

      - name: Run StatsEmploi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENT: ${{ secrets.SMTP_RECIPIENT }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/veille/stats_emploi.py $DRY_FLAG

      - name: Commit rapport emploi
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add veille/rapports/emploi/
          git diff --staged --quiet || git commit -m "📊 Rapport StatsEmploi $(date +%Y-%m-%d)"
          git push

  alert-on-failure:
    name: "⚠️ Alerte Échec"
    runs-on: ubuntu-latest
    needs: [veille-tech, stats-emploi]
    if: failure()

    steps:
      - name: Send failure alert
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `⚠️ **Veille Hebdomadaire — ÉCHEC**\n\nUn ou plusieurs jobs ont échoué.\n\n🔗 [Voir les logs](${run_url})\n\nDate: ${new Date().toLocaleDateString('fr-FR')}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Veille hebdomadaire échouée — ${new Date().toLocaleDateString('fr-FR')}`,
              body: body,
              labels: ['bug', 'veille']
            });
